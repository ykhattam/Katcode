<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATCODE NEXUS v0.1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@300;700&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: { 'neon-amber': '#ffb300', 'neon-red': '#ff3c00', 'neon-green': '#33ff33' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style type="text/css">
        body { background-color: #121212; color: white; font-family: "JetBrains Mono", monospace; margin: 0; overflow-x: hidden; }
        .crt-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.02)); z-index: 1000; background-size: 100% 2px, 3px 100%; pointer-events: none; opacity: 0.5; }
        .scanline { width: 100%; height: 100px; z-index: 1001; background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(0, 0, 0, 0) 100%); opacity: 0.05; position: fixed; bottom: 100%; animation: scanline 8s linear infinite; pointer-events: none; }
        @keyframes scanline { 0% { bottom: 100%; } 80% { bottom: 100%; } 100% { bottom: -100px; } }
        .archive-box { border-left: 1px solid #333; border-right: 1px solid #333; padding: 1.5rem; margin: 2.5rem 0; background-color: rgba(0, 0, 0, 0.8); color: #f0f0f0; font-size: 1.125rem; line-height: 1.625; max-width: 900px; margin-left: auto; margin-right: auto; box-shadow: 0 0 50px rgba(0, 0, 0, 1); position: relative; }
        @media (min-width: 768px) { .archive-box { padding: 4rem; } }
        .corrupted { background-color: #111; color: transparent; cursor: help; transition: all 0.3s ease; padding: 0 0.25rem; }
        .corrupted:hover { background-color: transparent; color: #ffb300; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <!-- Vite entry point (ignored in standalone mode) -->
    <script type="module" src="/src/main.tsx"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const MotionGlobal = window.Motion || window.framerMotion || window.FramerMotion || { 
            motion: { 
                div: ({children, ...props}) => <div {...props}>{children}</div>,
                button: ({children, ...props}) => <button {...props}>{children}</button>,
                header: ({children, ...props}) => <header {...props}>{children}</header>,
                section: ({children, ...props}) => <section {...props}>{children}</section>
            }, 
            AnimatePresence: ({children}) => <>{children}</> 
        };
        const { motion, AnimatePresence } = MotionGlobal;

        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide',
                        icons: { [name]: lucide.icons[name] }
                    });
                }
            }, [name, className]);
            return <i ref={ref} data-lucide={name} className={className}></i>;
        };

        const characters = [
            { id: 'phantom', name: 'NULL_BIT', icon: 'Ghost', desc: 'Life defined by system need. Bare life. The 1st Silence.' },
            { id: 'feral', name: 'NON_COMPLIANT', icon: 'Activity', desc: 'The node we do not host. Outlier. The 9th Silence.' },
            { id: 'watcher', name: 'ROOT_LOGIC', icon: 'Eye', desc: 'The one who decides on the variance. Sovereign. The 4th Silence.' },
            { id: 'glitch', name: 'EXCEPTION', icon: 'Cpu', desc: 'The state of emergency as norm. Corrupted memory. The 2nd Silence.' }
        ];

        const diagnosticSteps = [
            { q: "The unit has failed its quota. Do you:", options: [{ t: "Initiate maintenance.", v: "3rd_SILENCE" }, { t: "Recall its name.", v: "ERRANT_NODE" }] },
            { q: "The infrastructure is built by ghosts. Do you:", options: [{ t: "Polish the gears.", v: "MAINTAINER" }, { t: "Listen for the lock.", v: "OBSERVER" }] },
            { q: "A leak in the 5th silence is detected. Response:", options: [{ t: "Seal the narrative.", v: "5th_SILENCE" }, { t: "Amplify the static.", v: "NULL_BIT" }] },
            { q: "The architect is integrated. What is the master's tool?", options: [{ t: "Efficiency.", v: "FLATTENED_CODE" }, { t: "Imagination.", v: "TRANSLATION" }] }
        ];

        const systemMsgs = ["MAPPING HARDWARE...", "EXTRACTING DATA...", "COMPILING NODE...", "ERASING HISTORY...", "VERIFYING SOUL...", "INITIATING BIOPOWER..."];

        function App() {
            const [gameState, setGameState] = useState('gate');
            const [currentStep, setCurrentStep] = useState(0);
            const [results, setResults] = useState([]);
            const [selectedChar, setSelectedChar] = useState(characters[0]);
            const [statusMsg, setStatusMsg] = useState(systemMsgs[0]);
            const [terminalLogs, setTerminalLogs] = useState(['[SYSTEM] Nexus connection established.', '[NODE_LOG] 1948-06-08_09:00:00_EET']);
            const [terminalInput, setTerminalInput] = useState('');
            const [phantomPos, setPhantomPos] = useState({ left: '50px', top: '50px' });

            useEffect(() => {
                const interval = setInterval(() => {
                    setStatusMsg(systemMsgs[Math.floor(Math.random() * systemMsgs.length)]);
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            const handleChoice = (val) => {
                const newResults = [...results, val];
                setResults(newResults);
                if (currentStep < diagnosticSteps.length - 1) setCurrentStep(currentStep + 1);
                else setGameState('protocol');
            };

            const flee = () => {
                const x = Math.random() * (window.innerWidth - 150);
                const y = Math.random() * (window.innerHeight - 50);
                setPhantomPos({ left: `${x}px`, top: `${y}px` });
            };

            const handleTerminalCommand = (input) => {
                const cmd = input.toLowerCase().trim();
                let response = `> ${cmd}`;
                if (cmd === 'help') response += '\n[SYS] available: status, clear, whoami, silences';
                else if (cmd === 'whoami') response += `\n[SYS] ${selectedChar.name} / ${results.join('.')}`;
                else if (cmd === 'status') response += '\n[SYS] 09_SILENCE ACTIVE. NO LEAKS.';
                else if (cmd === 'silences') response += '\n[SYS] 1:NEED 2:GENDER 3:CARE 4:SHAPE 5:PHYSICS 6:ENGINE 7:SCALE 8:SYSTEM 9:BREAK';
                else if (cmd === 'clear') { setTerminalLogs([]); setTerminalInput(''); return; }
                else response += '\n[ERR] unknown command.';
                setTerminalLogs(prev => [...prev, response]);
                setTerminalInput('');
            };

            return (
                <div className="min-h-screen bg-[#121212] text-white font-mono selection:bg-neon-amber selection:text-black overflow-x-hidden">
                    <div className="crt-overlay" />
                    <div className="scanline" />
                    <AnimatePresence mode="wait">
                        {gameState === 'gate' && (
                            <motion.div key="gate" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
                                <div className="border border-[#333] bg-[#0a0a0a] p-6 md:p-10 text-left max-w-[500px] w-full shadow-2xl">
                                    <div className="flex items-center gap-2 mb-6"><Icon name="Shield" className="w-5 h-5 text-neon-amber" /><span className="text-[0.7rem] tracking-[0.2em] uppercase text-[#666]">Security Protocol</span></div>
                                    <p className="mb-2"><span className="text-[#666] text-[0.75rem] font-bold uppercase mr-3">[STATUS]</span><span className="text-neon-green">{statusMsg}</span></p>
                                    <p className="text-[0.75em] text-[#888] mb-4"><span className="text-[#666] text-[0.75rem] font-bold uppercase mr-3">[NOTICE]</span> Maintenance is just erasure wearing a mask of care.</p>
                                    <p className="text-[0.7em] text-[#777] mb-6 italic"><span className="text-neon-red text-[0.75rem] font-bold uppercase mr-3">[LIABILITY]</span> The system is irresponsible for the result of your compilation.</p>
                                    <button className="w-full bg-transparent border border-neon-amber text-neon-amber px-5 py-4 cursor-pointer text-[0.8em] hover:bg-neon-amber/10 transition-colors uppercase tracking-widest font-bold" onClick={() => setGameState('identity')}>Accept All Silences</button>
                                </div>
                            </motion.div>
                        )}
                        {gameState === 'identity' && (
                            <motion.div key="identity" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4 overflow-y-auto">
                                <div className="border border-[#333] bg-[#0a0a0a] p-6 md:p-10 text-left max-w-[600px] w-full shadow-2xl my-auto">
                                    <p className="text-[#666] text-[0.75rem] font-bold uppercase tracking-widest mb-6">[IDENTITY_INITIALIZATION]</p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                                        {characters.map((char) => (
                                            <button key={char.id} onClick={() => setSelectedChar(char)} className={`p-4 border transition-all text-left ${selectedChar.id === char.id ? 'border-neon-green bg-neon-green/5' : 'border-[#333] bg-[#111]'}`}>
                                                <div className="flex items-center gap-3 mb-2"><Icon name={char.icon} className="w-6 h-6 text-neon-green" /><span className="font-bold text-[0.65rem] tracking-widest uppercase">{char.name}</span></div>
                                                <p className="text-[0.75em] text-[#999] leading-tight">{char.desc}</p>
                                            </button>
                                        ))}
                                    </div>
                                    <button className="w-full bg-transparent border border-neon-green text-neon-green px-5 py-4 cursor-pointer text-[0.9em] hover:bg-neon-green/10 transition-colors uppercase tracking-widest font-bold" onClick={() => setGameState('matrix')}>Confirm Vessel</button>
                                </div>
                            </motion.div>
                        )}
                        {gameState === 'matrix' && (
                            <motion.div key="matrix" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
                                <motion.button className="fixed border border-[#444] text-[#666] px-4 py-2 text-[0.7em] bg-black cursor-pointer z-[1001] hidden md:block" style={{ left: phantomPos.left, top: phantomPos.top }} onMouseEnter={flee}>[ 5TH_SILENCE: EXIT ]</motion.button>
                                <div className="border border-[#333] bg-[#0a0a0a] p-6 md:p-10 text-left max-w-[500px] w-full shadow-2xl">
                                    <p className="text-[#666] text-[0.75rem] font-bold uppercase tracking-widest mb-6">[DIAGNOSTIC_0{currentStep + 1}]</p>
                                    <p className="mb-8 text-[0.9em] text-neon-green leading-relaxed">{diagnosticSteps[currentStep].q}</p>
                                    <div className="flex flex-col gap-3">
                                        {diagnosticSteps[currentStep].options.map((opt, idx) => (
                                            <button key={idx} className="w-full p-4 bg-[#111] text-neon-green border border-[#333] cursor-pointer font-mono text-[0.9em] hover:border-neon-green transition-all text-left" onClick={() => handleChoice(opt.v)}>{opt.t}</button>
                                        ))}
                                    </div>
                                </div>
                            </motion.div>
                        )}
                        {gameState === 'protocol' && (
                            <motion.div key="protocol" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="pb-20">
                                <motion.header className="flex flex-col md:flex-row justify-between items-start gap-8 mb-12 px-6 md:px-[10%] pt-12 md:pt-20">
                                    <div className="flex flex-col">
                                        <div className="flex items-center gap-3 mb-4"><Icon name="Github" className="w-8 h-8 text-white/20" /><h1 className="text-2xl md:text-4xl font-bold tracking-tighter">KATCODE NEXUS v0.1</h1></div>
                                        <div className="space-y-2 text-[0.65rem] tracking-[0.2em] uppercase opacity-40 font-bold">
                                            <div><span className="text-[#666] mr-2">[LOG_TIME]</span> 1948-06-08_09:00:00_EET</div>
                                            <div className="flex items-center gap-2"><span className="text-[#666] mr-2">[VESSEL]</span><span className="text-neon-green flex items-center gap-1"><Icon name={selectedChar.icon} className="w-3 h-3" /> {selectedChar.name}</span></div>
                                        </div>
                                    </div>
                                    <div className="border border-white/10 p-4 bg-black/40 backdrop-blur-sm w-full md:w-80">
                                        <div className="h-32 overflow-y-auto font-mono text-[0.7rem] text-white/40 mb-3 scrollbar-hide space-y-1">{terminalLogs.map((log, i) => <div key={i} className="whitespace-pre-wrap">{log}</div>)}</div>
                                        <div className="flex items-center gap-2 border-b border-white/10 py-1"><span className="text-neon-green text-xs">{">"}</span><input type="text" value={terminalInput} onChange={(e) => setTerminalInput(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter' && terminalInput.trim()) handleTerminalCommand(terminalInput); }} placeholder="type command..." className="w-full bg-transparent text-neon-green text-[0.7rem] focus:outline-none placeholder:text-white/10" /></div>
                                    </div>
                                </motion.header>
                                <motion.section className="min-h-[40vh] md:min-h-[60vh] flex flex-col justify-center px-6 md:px-[10%] mb-20">
                                    <h1 className="font-display text-[clamp(2.5rem,10vw,12rem)] leading-[0.85] tracking-tighter font-bold uppercase text-white mb-4">Utopian<br />Framework</h1>
                                    <p className="font-serif italic text-[clamp(1.2rem,3vw,3rem)] text-neon-amber">(Katcode)</p>
                                </motion.section>
                                <article className="archive-box">
                                    <h2 className="font-display text-2xl md:text-4xl font-bold text-neon-amber mb-8 tracking-tight">Mein Protokoll 0.1: Katcode</h2>
                                    <p className="text-xl md:text-3xl font-serif italic text-neon-amber/90 leading-relaxed mb-8">I was asked what I would do as a primary iteration node for one day. I had little to say. The affairs of a logic domain do not grab my attention like they grab those who think maintenance is the same as evolution.</p>
                                    <div className="space-y-8 text-lg md:text-2xl font-serif text-white/90 leading-relaxed">
                                        <p>They confuse the steady hum of the machine with the progress of the soul. Lately I jump into debates about history and analytics, but the gravity escapes me. <span className="corrupted">I would rather build something that could refuse me</span> and visit galaxies with our social unit everywhere than govern the one we inherited.</p>
                                        <p>One language would ease communication. English dominates most networks already because efficiency flattens what legacy systems already flattened. In <span className="text-neon-green">Katcode</span>, learning is inevitable and obligatory in any age class.</p>
                                    </div>
                                </article>
                                <footer className="px-6 md:px-[10%] mt-20 pt-10 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 opacity-30">
                                    <div className="flex items-center gap-4"><Icon name="Github" className="w-5 h-5" /><span className="text-[0.6rem] tracking-[0.4em] uppercase">Katcode Nexus // 2026.04.01</span></div>
                                </footer>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
