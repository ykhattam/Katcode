<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol 0.1: Katcode</title>
    <style>
        :root { --neon-amber: #ffb300; --neon-red: #ff3c00; --neon-green: #33ff33; }
        body { background: black; color: var(--neon-green); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #security-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 999;
        }
        .paradox-box {
            border: 2px solid var(--neon-amber); background: #1a1100;
            padding: 40px; text-align: center; max-width: 600px; box-shadow: 0 0 20px var(--neon-amber);
        }
        .progress-container { width: 100%; height: 10px; background: #332200; margin: 20px 0; }
        .progress-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-amber), var(--neon-red));
            animation: load 5s forwards;
        }
        @keyframes load { 0% { width: 0%; } 90% { width: 99%; } 100% { width: 99.5%; } }
        button {
            background: var(--neon-amber); color: black; border: none;
            padding: 15px 30px; font-weight: bold; cursor: pointer;
        }
        #main-protocol { padding: 50px 15%; display: none; }
    </style>
</head>
<body>
    <div id="security-gate">
        <div class="paradox-box">
            <h2>[ UNAUTHORIZED NODE DETECTED ]</h2>
            <div class="progress-container"><div class="progress-bar"></div></div>
            <button onclick="unlockProtocol()">ACCEPT ALL SILENCES</button>
        </div>
    </div>

    <div id="main-protocol">
        <h1>KATCODE NEXUS v0.1</h1>
        <p>This is not a proposal. It is a simulation already in progress...</p>
        </div>

    <script>
        function unlockProtocol() {
            document.getElementById('security-gate').style.display = 'none';
            document.getElementById('main-protocol').style.display = 'block';
            console.log("9th Silence initiated. Do not attempt to logout.");
        }
    </script>
</body>
</html>
<style>
    /* Add a flickering CRT effect */
    .crt-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
    }

    /* The Glitch Animation */
    @keyframes text-glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
    }
    .status-text { color: var(--neon-amber); font-size: 0.8em; animation: text-glitch 3s infinite; }
</style>

<script>
    let statusMessages = [
        "Mapping hardware signature...",
        "Bypassing local firewall...",
        "Extracting latent memories...",
        "Compiling User into Node...",
        "Erasing browser history (Simulated)..."
    ];
    let i = 0;

    // Rotate scary status messages while they wait
    setInterval(() => {
        const statusElement = document.querySelector('.status-text');
        if (statusElement) {
            statusElement.innerText = statusMessages[i % statusMessages.length];
            i++;
        }
    }, 2000);

    function unlockProtocol() {
        // Trigger a fake "Alert" before showing the page
        alert("CRITICAL: 9th Silence Detected. The 'Actual Land' is now read-only.");
        
        document.getElementById('security-gate').style.display = 'none';
        document.getElementById('main-protocol').style.display = 'block';
        document.getElementById('main-protocol').style.opacity = '1';
        
        // Start the 'Autoread' prank
        window.scrollBy({ top: 5000, behavior: 'smooth' });
    }
</script>
