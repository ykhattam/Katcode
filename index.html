<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katcode Nexus Protocol</title>
    
    <meta property="og:title" content="Katcode Nexus Protocol" />
    <meta property="og:description" content="A utopian framework for life management and logic domain iteration." />
    <meta property="og:image" content="https://picsum.photos/seed/katcode/1200/630?blur=2" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>" />
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --neon-amber: #ffb100;
            --anthracite-dark: #1a1a1a;
            --anthracite-medium: #2b2b2b;
            --anthracite-light: #3a3a3a;
        }

        body {
            background-color: var(--anthracite-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 101;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; position: absolute; bottom: 100%;
            animation: scanline 10s linear infinite; pointer-events: none;
        }

        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }

        .glitch-text { position: relative; display: inline-block; }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--anthracite-dark);
        }
        .glitch-text::before { left: 2px; text-shadow: -2px 0 #ff00c1; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim 5s infinite linear alternate-reverse; }
        .glitch-text::after { left: -2px; text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1; animation: glitch-anim2 1s infinite linear alternate-reverse; }

        @keyframes glitch-anim { 0% { clip: rect(31px, 9999px, 94px, 0); } 100% { clip: rect(70px, 9999px, 71px, 0); } }
        @keyframes glitch-anim2 { 0% { clip: rect(65px, 9999px, 100px, 0); } 100% { clip: rect(10px, 9999px, 20px, 0); } }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .markdown-body h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 2rem; color: var(--neon-green); letter-spacing: -0.02em; }
        .markdown-body h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 600; margin-top: 3rem; margin-bottom: 1.5rem; color: var(--neon-green); letter-spacing: -0.01em; }
        .markdown-body p { margin-bottom: 1.5rem; line-height: 1.7; color: #d1d5db; font-size: 1rem; }
        .markdown-body code { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.05); padding: 0.2rem 0.4rem; border-radius: 0.2rem; font-size: 0.85rem; color: var(--neon-amber); }
        .markdown-body pre { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 0.3rem; margin-bottom: 2rem; overflow-x: auto; }

        .glitch-active { animation: screen-glitch 0.2s infinite; }
        @keyframes screen-glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        * { cursor: crosshair !important; }

        .meter-fill {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const PROTOCOL_TEXT = `
# Mein protokoll 0.1: Katcode

I was asked what I would do as a primary iteration node for one day. I had little to say. The affairs of a logic domain do not grab my attention like they grab those who think maintenance is the same as evolution.

## The Nexus Core

Maintenance is for the static. Evolution is for the fluid. Katcode is the fluid. It is the utopian framework for life management and logic domain iteration. We do not fix bugs; we iterate the logic until the bug is no longer a valid state.

### Core Directives:
1. **Absolute Transparency**: Logic must be readable by both human and machine.
2. **Recursive Optimization**: Every cycle must be more efficient than the last.
3. **Utopian Probability**: We aim for 88.2% stability. Perfection is a static trap.

## Domain Iteration

The nexus protocol operates on the principle of the **9th Silence**. When the noise of the domain becomes too loud, we initiate a silence. In that silence, the logic recalibrates.

*   **Phase 1**: Noise identification.
*   **Phase 2**: Logic decoupling.
*   **Phase 3**: Nexus reintegration.
`;

        const POEM_TEXT = `
Coda (the nexus speaks)
Katcode looks fake.
We were searching for the plate.
Or is this just a break?
Join us; and do not hesitate.
[9th Silence: Initiated.]
`;

        const PUBLISHER_EMAIL = "yassinelkhattam@gmail.com";

        const UNIT_DATA = {
          child: {
            name: "THE CHILD",
            type: "Sub-Process",
            quotes: [
              "Play has no metric. Uselessness is threat.",
              "The child is optimization, not childhood.",
              "The sub-process is a project before a person.",
              "We form the subject before he can refuse."
            ]
          },
          nullbit: {
            name: "THE NULL-BIT",
            type: "Erased",
            quotes: [
              "She is the null-bit: bare life.",
              "Life defined by system need, not by being.",
              "Death, exile, digital deletion.",
              "The unit who refused the score exists, but we do not speak of her."
            ]
          },
          validator: {
            name: "THE VALIDATOR",
            type: "Enforcer",
            quotes: [
              "Maintenance is care. Erasure is efficiency.",
              "Global visibility leaves no room for mercy.",
              "The transparent exhibition is voluntary and compelled.",
              "Who watches the watcher?"
            ]
          },
          bug: {
            name: "THE BUG",
            type: "Anomaly",
            quotes: [
              "Error is only negative.",
              "Serendipity eliminated.",
              "The patch that patches the patcher.",
              "Amor compilationis: love not of what is, but of what was compiled for you to want."
            ]
          }
        };

        const SILENCES = [
          { id: 1, title: "Null-Bit Life", desc: "Life defined by system need, not by being. Giorgio Agamben's bare life — erased without sacrifice." },
          { id: 2, title: "Pronoun Erasure", desc: "The text uses 'he' throughout. The erasure was in the words before the mechanism was named." },
          { id: 3, title: "Maintenance as Erasure", desc: "We call this maintenance rather than erasure. Maintenance is erasure named as care." },
          { id: 4, title: "Scored Compliance", desc: "The score that measures life is the score that measures compliance — awareness without the capacity for refusal." },
          { id: 5, title: "Physics of Erasure", desc: "Death, exile, digital deletion — the mechanics of removal from the system." },
          { id: 6, title: "Economic Engine", desc: "What creates value? What prevents accumulation? We speak of units when we mean classes we do not name." },
          { id: 7, title: "Scale Question", desc: "Is this city, planet, galaxy? Expansion is defense disguised as invitation." },
          { id: 8, title: "The System Itself", desc: "The system itself is the eighth silence. Rule without eros, without philia, without agape." },
          { id: 9, title: "The Break", desc: "The break is the ninth. Serendipity as threat. The code that cannot compile its own compiler." }
        ];

        const useSound = () => {
            const audioCtx = useRef(null);
            const playSound = (freq, type = 'square', duration = 0.1, volume = 0.1) => {
                try {
                    if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                    const ctx = audioCtx.current;
                    if (ctx.state === 'suspended') ctx.resume();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(volume, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {}
            };
            return useMemo(() => ({
                playBeep: () => playSound(880, 'square', 0.05, 0.05),
                playSuccess: () => { playSound(660, 'sine', 0.1, 0.05); playSound(880, 'sine', 0.1, 0.05); },
                playGlitch: () => playSound(100 + Math.random() * 1000, 'sine', 0.02, 0.05)
            }), []);
        };

        const MatrixRain = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);
                const columns = Math.floor(canvas.width / 20);
                const drops = new Array(columns).fill(1);
                const chars = "01KATCODE";
                const draw = () => {
                    ctx.fillStyle = "rgba(26, 26, 26, 0.05)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#00ff41";
                    ctx.font = "15px monospace";
                    for (let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        ctx.fillText(text, i * 20, drops[i] * 20);
                        if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                };
                const interval = setInterval(draw, 33);
                return () => { clearInterval(interval); window.removeEventListener('resize', resize); };
            }, []);
            return <canvas ref={canvasRef} className="fixed inset-0 opacity-10 pointer-events-none z-0" />;
        };

        const EstimationScreen = ({ onComplete }) => {
            const [prob, setProb] = useState("0");
            const [isDone, setIsDone] = useState(false);
            const { playSuccess, playBeep } = useSound();

            useEffect(() => {
                let current = 0;
                const interval = setInterval(() => {
                    current += Math.random() * 5;
                    if (current >= 88.2) { 
                        setProb("88.2"); 
                        setIsDone(true); 
                        playSuccess();
                        clearInterval(interval); 
                    }
                    else { setProb(current.toFixed(1)); }
                }, 50);
                return () => clearInterval(interval);
            }, [playSuccess]);

            const handleProceed = () => {
                playBeep();
                onComplete();
            };

            return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#1a1a1a] p-8 relative overflow-hidden">
                    <div className="crt-overlay" />
                    <div className="scanline" />
                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="max-w-xl w-full border border-white/10 bg-[#2b2b2b]/40 p-12 backdrop-blur-xl z-10">
                        <div className="text-[10px] font-semibold mb-8 text-[#ffb100] uppercase tracking-widest">Consulting estimation v0.1</div>
                        <h2 className="text-4xl font-display font-bold mb-6 tracking-tight text-white">Utopian probability</h2>
                        <div className="text-6xl font-display font-bold text-[#00ff41] mb-8 tabular-nums">{prob}%</div>
                        {isDone && <button onClick={handleProceed} className="w-full py-4 border border-[#00ff41] text-[#00ff41] hover:bg-[#00ff41] hover:text-black transition-all font-bold text-xs uppercase tracking-widest">Proceed to Nexus</button>}
                    </motion.div>
                </div>
            );
        };

        function App() {
            const [currentStep, setCurrentStep] = useState('estimation');
            const [view, setView] = useState('protocol');
            const [isGlitching, setIsGlitching] = useState(false);
            const [compliance, setCompliance] = useState(0);
            const [resistance, setResistance] = useState(0);
            const [logs, setLogs] = useState([
              { msg: "KATCODE v0.1 initialized...", type: 'system' },
              { msg: "Nexus connection established...", type: 'system' }
            ]);
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [revealedSilences, setRevealedSilences] = useState([]);

            const { playGlitch, playBeep, playSuccess } = useSound();

            const addLog = (msg, type = 'normal') => {
              setLogs(prev => [...prev, { msg, type }].slice(-20));
            };

            useEffect(() => {
                const interval = setInterval(() => { 
                    if (Math.random() > 0.98 && currentStep === 'main') { 
                        setIsGlitching(true); 
                        playGlitch();
                        setTimeout(() => setIsGlitching(false), 150); 
                    } 
                }, 3000);
                return () => clearInterval(interval);
            }, [currentStep, playGlitch]);

            const handleAction = (type) => {
              playBeep();
              if (type === 'sync') {
                setCompliance(prev => Math.min(100, prev + 12));
                setResistance(prev => Math.max(0, prev - 5));
                addLog("Sync protocol executed. Compliance increased.", 'system');
              } else if (type === 'refuse') {
                setResistance(prev => Math.min(100, prev + 15));
                setCompliance(prev => Math.max(0, prev - 5));
                addLog("Refusal detected. Resistance index rising.", 'warning');
              } else {
                setCompliance(prev => Math.min(100, prev + 5));
                setResistance(prev => Math.min(100, prev + 8));
                addLog("Analysis query logged. System integrity check pending.");
              }
            };

            const revealSilence = (id) => {
              if (!revealedSilences.includes(id)) {
                playBeep();
                setRevealedSilences(prev => [...prev, id]);
                addLog(`Silence ${id} decrypted.`, 'system');
              }
            };

            if (currentStep === 'estimation') return <EstimationScreen onComplete={() => setCurrentStep('gate')} />;

            if (currentStep === 'gate') return (
              <div className="h-screen flex items-center justify-center p-8 relative bg-[#1a1a1a]">
                <div className="crt-overlay" />
                <div className="max-w-md w-full border-2 border-[#ffb100] bg-[#1a1100] p-10 text-center shadow-[0_0_20px_rgba(255,177,0,0.3)] z-10">
                  <h2 className="text-[#ffb100] font-mono text-xl mb-6 glitch-text" data-text="[ UNAUTHORIZED NODE ]">[ UNAUTHORIZED NODE ]</h2>
                  <p className="text-[#ffb100]/80 text-sm mb-8 font-mono">Your hardware signature is being mapped to the Katcode Nexus...</p>
                  <div className="w-full h-2 bg-[#332200] mb-8 overflow-hidden">
                    <motion.div 
                      initial={{ width: 0 }}
                      animate={{ width: "100%" }}
                      transition={{ duration: 3, ease: "linear" }}
                      className="h-full bg-gradient-to-r from-[#ffb100] to-[#ff3131]"
                    />
                  </div>
                  <button 
                    onClick={() => { playSuccess(); setCurrentStep('main'); }}
                    className="w-full py-4 bg-[#ffb100] text-black font-bold uppercase tracking-widest hover:bg-white transition-all shadow-[0_0_15px_rgba(255,177,0,0.5)]"
                  >
                    Accept All Silences
                  </button>
                </div>
              </div>
            );

            return (
                <div className={`h-screen flex flex-col bg-[#1a1a1a] overflow-hidden ${isGlitching ? 'glitch-active' : ''}`}>
                    <MatrixRain />
                    <div className="crt-overlay" />
                    <div className="scanline" />
                    <AnimatePresence mode="wait">
                        <motion.div key="main" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="h-full flex flex-col relative z-10">
                            <header className="border-b border-white/10 bg-[#2b2b2b]/80 backdrop-blur-md p-4 flex items-center justify-between shrink-0">
                                <div className="flex items-center gap-4">
                                    <div className="w-8 h-8 bg-[#00ff41] flex items-center justify-center rounded-sm">
                                        <span className="text-black font-bold">⚡</span>
                                    </div>
                                    <div>
                                        <h1 className="text-lg font-display font-bold tracking-tight uppercase leading-none">Nexus <span className="text-[#00ff41]">Protocol</span></h1>
                                        <p className="text-[9px] text-white/40 font-mono uppercase tracking-widest mt-1">Iteration v0.1.42</p>
                                    </div>
                                </div>
                                
                                <nav className="flex gap-1 bg-black/40 p-1 rounded-sm border border-white/5">
                                    <button 
                                      onClick={() => { playBeep(); setView('protocol'); }}
                                      className={`px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all ${view === 'protocol' ? 'bg-[#00ff41] text-black' : 'text-white/60 hover:text-white'}`}
                                    >
                                      Protocol
                                    </button>
                                    <button 
                                      onClick={() => { playBeep(); setView('dashboard'); }}
                                      className={`px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all ${view === 'dashboard' ? 'bg-[#00ff41] text-black' : 'text-white/60 hover:text-white'}`}
                                    >
                                      Dashboard
                                    </button>
                                </nav>

                                <div className="flex items-center gap-4">
                                    <a 
                                        href={`mailto:${PUBLISHER_EMAIL}`} 
                                        onClick={() => playBeep()}
                                        className="text-[#00ff41] hover:underline text-[10px] font-mono"
                                    >
                                        CONTACT
                                    </a>
                                    <a 
                                        href="https://github.com/yassinelkhattam" 
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        onClick={() => playBeep()}
                                        className="text-[#00ff41] hover:underline text-[10px] font-mono"
                                    >
                                        GITHUB
                                    </a>
                                </div>
                            </header>

                            <div className="flex-1 flex overflow-hidden">
                              <main className="flex-1 overflow-y-auto p-8 md:p-12 scrollbar-hide">
                                  <AnimatePresence mode="wait">
                                    {view === 'protocol' ? (
                                      <motion.div key="prot" initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 20 }} className="max-w-4xl mx-auto">
                                          <div className="mb-12">
                                            <h1 className="text-6xl font-display font-bold text-white mb-4 tracking-tighter">
                                                <span className="text-[#00ff41] glitch-text" data-text="Katcode">Katcode</span>
                                            </h1>
                                            <div className="h-1 w-20 bg-[#00ff41]" />
                                          </div>
                                          <div className="markdown-body" dangerouslySetInnerHTML={{ __html: marked.parse(PROTOCOL_TEXT) }} />
                                          <div className="mt-24 p-8 border border-[#ffb100]/20 bg-black/40 rounded-sm">
                                              <pre className="font-mono text-sm text-[#ffb100] leading-relaxed whitespace-pre-wrap">{POEM_TEXT}</pre>
                                          </div>
                                      </motion.div>
                                    ) : (
                                      <motion.div key="dash" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="h-full flex flex-col gap-8">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                          <div className="space-y-6">
                                            <div className="bg-[#2b2b2b]/40 border border-white/10 p-6 rounded-sm">
                                              <div className="flex justify-between items-end mb-4">
                                                <div className="text-[10px] font-bold text-white/60 uppercase tracking-widest">Compliance Matrix</div>
                                                <div className="text-2xl font-mono text-[#00ff41]">{compliance}%</div>
                                              </div>
                                              <div className="h-4 bg-black/60 border border-[#00ff41]/20 relative overflow-hidden">
                                                <div className="h-full bg-gradient-to-r from-[#00ff41] to-[#00cc6a] meter-fill" style={{ width: `${compliance}%` }} />
                                              </div>
                                            </div>
                                            <div className="bg-[#2b2b2b]/40 border border-white/10 p-6 rounded-sm">
                                              <div className="flex justify-between items-end mb-4">
                                                <div className="text-[10px] font-bold text-white/60 uppercase tracking-widest">Resistance Index</div>
                                                <div className="text-2xl font-mono text-[#ff3131]">{resistance}%</div>
                                              </div>
                                              <div className="h-4 bg-black/60 border border-[#ff3131]/20 relative overflow-hidden">
                                                <div className="h-full bg-gradient-to-r from-[#ff3131] to-[#ff6666] meter-fill" style={{ width: `${resistance}%` }} />
                                              </div>
                                            </div>
                                          </div>
                                          <div className="bg-[#2b2b2b]/40 border border-white/10 p-6 rounded-sm flex flex-col">
                                            <div className="text-[10px] font-bold text-white/60 uppercase tracking-widest mb-6">Nexus Interaction</div>
                                            <div className="flex-1 flex flex-col justify-center items-center gap-4">
                                              <button onClick={() => handleAction('sync')} className="w-full py-4 border-2 border-[#00ff41] text-[#00ff41] font-bold uppercase tracking-widest hover:bg-[#00ff41] hover:text-black transition-all">Sync Protocol</button>
                                              <button onClick={() => handleAction('refuse')} className="w-full py-4 border-2 border-[#ff3131] text-[#ff3131] font-bold uppercase tracking-widest hover:bg-[#ff3131] hover:text-black transition-all">Refuse Command</button>
                                              <button onClick={() => handleAction('question')} className="w-full py-4 border-2 border-white/20 text-white/60 font-bold uppercase tracking-widest hover:bg-white hover:text-black transition-all">Question Logic</button>
                                            </div>
                                          </div>
                                        </div>
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1 min-h-0">
                                          <div className="bg-[#2b2b2b]/40 border border-white/10 p-6 rounded-sm flex flex-col">
                                            <div className="text-[10px] font-bold text-white/60 uppercase tracking-widest mb-4">Interactable Units</div>
                                            <div className="space-y-2 overflow-y-auto pr-2 scrollbar-hide">
                                              {Object.entries(UNIT_DATA).map(([key, unit]) => (
                                                <button key={key} onClick={() => { playBeep(); setSelectedUnit(key); }} className={`w-full p-4 text-left border transition-all ${selectedUnit === key ? 'bg-[#00ff41]/10 border-[#00ff41] text-[#00ff41]' : 'bg-black/20 border-white/5 text-white/60 hover:border-white/20'}`}>
                                                  <div className="text-xs font-bold">{unit.name}</div>
                                                  <div className="text-[9px] opacity-60 uppercase tracking-tighter">[{unit.type}]</div>
                                                </button>
                                              ))}
                                            </div>
                                          </div>
                                          <div className="bg-[#2b2b2b]/40 border border-white/10 p-6 rounded-sm flex flex-col lg:col-span-2">
                                            <div className="text-[10px] font-bold text-white/60 uppercase tracking-widest mb-4">Unit Data Stream</div>
                                            <div className="flex-1 flex flex-col justify-center items-center text-center p-8 border border-white/5 bg-black/20">
                                              {selectedUnit ? (
                                                <div className="space-y-4">
                                                  <p className="text-lg font-display italic text-white/90 leading-relaxed">"{UNIT_DATA[selectedUnit].quotes[Math.floor(Math.random() * UNIT_DATA[selectedUnit].quotes.length)]}"</p>
                                                  <div className="text-[10px] font-mono text-[#00ff41]/60 uppercase">Source: {UNIT_DATA[selectedUnit].name}_LOG</div>
                                                </div>
                                              ) : (
                                                <div className="text-white/20 uppercase tracking-widest text-xs">Select a unit to begin interaction</div>
                                              )}
                                            </div>
                                          </div>
                                        </div>
                                      </motion.div>
                                    )}
                                  </AnimatePresence>
                              </main>

                              <aside className="w-80 border-l border-white/10 bg-black/20 hidden xl:flex flex-col shrink-0">
                                <div className="p-6 border-b border-white/10">
                                  <div className="text-[10px] font-bold text-white/60 uppercase tracking-widest mb-4">The Nine Silences</div>
                                  <div className="grid grid-cols-3 gap-2">
                                    {SILENCES.map(s => (
                                      <button key={s.id} onClick={() => revealSilence(s.id)} className={`aspect-square flex items-center justify-center border text-xs font-mono transition-all ${revealedSilences.includes(s.id) ? 'bg-[#00ff41] text-black border-[#00ff41]' : 'bg-transparent border-white/10 text-white/40 hover:border-white/30'}`}>
                                        {s.id}
                                      </button>
                                    ))}
                                  </div>
                                </div>
                                <div className="flex-1 flex flex-col min-h-0">
                                  <div className="p-4 bg-black/40 text-[9px] font-mono text-white/40 border-b border-white/10 uppercase tracking-widest">System Log</div>
                                  <div className="flex-1 overflow-y-auto p-4 font-mono text-[10px] space-y-2 scrollbar-hide">
                                    {logs.map((log, i) => (
                                      <div key={i} className={`flex gap-2 ${log.type === 'system' ? 'text-[#00ffff]' : log.type === 'warning' ? 'text-[#ff3131]' : 'text-white/60'}`}>
                                        <span className="shrink-0 opacity-40">[{new Date().toLocaleTimeString([], { hour12: false })}]</span>
                                        <span>{log.msg}</span>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                                <div className="p-6 bg-black/60 border-t border-white/10">
                                  <div className="text-[10px] font-bold uppercase tracking-widest text-[#ffb100]">9th Silence Status</div>
                                  <div className="mt-2 text-[9px] text-white/40 font-mono">
                                    {revealedSilences.length === 9 ? "INITIATED. THE BREAK IS HERE." : `DECRYPTING: ${revealedSilences.length}/9`}
                                  </div>
                                </div>
                              </aside>
                            </div>

                            <footer className="border-t border-white/10 bg-black/40 px-6 py-2 flex items-center justify-between text-[10px] font-mono text-white/40 shrink-0">
                                <div>LIVE_FEED | LATENCY: 12ms | U_PROB: 88.2%</div>
                                <div>NODE: {PUBLISHER_EMAIL}</div>
                            </footer>
                        </motion.div>
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
