    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --neon-amber: #ffb100;
            --anthracite-dark: #1a1a1a;
            --anthracite-medium: #2b2b2b;
            --anthracite-light: #3a3a3a;
        }

        body {
            background-color: var(--anthracite-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 101;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; position: absolute; bottom: 100%;
            animation: scanline 10s linear infinite; pointer-events: none;
        }

        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }

        .glitch-text { position: relative; display: inline-block; }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--anthracite-dark);
        }
        .glitch-text::before { left: 2px; text-shadow: -2px 0 #ff00c1; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim 5s infinite linear alternate-reverse; }
        .glitch-text::after { left: -2px; text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1; animation: glitch-anim2 1s infinite linear alternate-reverse; }

        @keyframes glitch-anim { 0% { clip: rect(31px, 9999px, 94px, 0); } 100% { clip: rect(70px, 9999px, 71px, 0); } }
        @keyframes glitch-anim2 { 0% { clip: rect(65px, 9999px, 100px, 0); } 100% { clip: rect(10px, 9999px, 20px, 0); } }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .markdown-body h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 2rem; color: white; letter-spacing: -0.02em; }
        .markdown-body h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 600; margin-top: 3rem; margin-bottom: 1.5rem; color: var(--neon-green); letter-spacing: -0.01em; }
        .markdown-body p { margin-bottom: 1.5rem; line-height: 1.7; color: #d1d5db; font-size: 1rem; }
        .markdown-body code { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.05); padding: 0.2rem 0.4rem; border-radius: 0.2rem; font-size: 0.85rem; color: var(--neon-amber); }
        .markdown-body pre { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 0.3rem; margin-bottom: 2rem; overflow-x: auto; }

        .glitch-active { animation: screen-glitch 0.2s infinite; }
        @keyframes screen-glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }

        * { cursor: crosshair !important; }

<body>
    <div id="root"></div>

    <script id="protocol-data" type="text/plain">

    <script id="poem-data" type="text/plain">
Coda (the nexus speaks)

    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        // FIX: Use 'Motion' instead of 'FramerMotion' for the CDN build
        const { motion, AnimatePresence } = Motion;

        const PROTOCOL_TEXT = document.getElementById('protocol-data').textContent;
        const POEM_TEXT = document.getElementById('poem-data').textContent;
        const PUBLISHER_EMAIL = "yassinelkhattam@gmail.com";

        const cn = (...classes) => classes.filter(Boolean).join(' ');

        // Audio Utility
        const useSound = () => {
            const audioCtx = useRef(null);
            const playSound = (freq, type = 'square', duration = 0.1, volume = 0.1) => {
                try {
                    if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                    const ctx = audioCtx.current;
                    if (ctx.state === 'suspended') ctx.resume();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(volume, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {}
            };
            return {
                playBeep: () => playSound(880, 'square', 0.05, 0.05),
                playSuccess: () => { playSound(660, 'sine', 0.1, 0.05); playSound(880, 'sine', 0.1, 0.05); },
                playGlitch: () => playSound(100 + Math.random() * 1000, 'sine', 0.02, 0.05)
            };
        };

        // Components (MatrixRain, EstimationScreen, etc. as defined in your file)
        const MatrixRain = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);
                const columns = Math.floor(canvas.width / 20);
                const drops = new Array(columns).fill(1);
                const chars = "01KATCODE";
                const draw = () => {
                    ctx.fillStyle = "rgba(26, 26, 26, 0.05)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#00ff41";
                    ctx.font = "15px monospace";
                    for (let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        ctx.fillText(text, i * 20, drops[i] * 20);
                        if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                };
                const interval = setInterval(draw, 33);
                return () => { clearInterval(interval); window.removeEventListener('resize', resize); };
            }, []);
            return <canvas ref={canvasRef} className="fixed inset-0 opacity-10 pointer-events-none z-0" />;
        };

        const EstimationScreen = ({ onComplete }) => {
            const [prob, setProb] = useState("0");
            const [isDone, setIsDone] = useState(false);
            useEffect(() => {
                let current = 0;
                const interval = setInterval(() => {
                    current += Math.random() * 5;
                    if (current >= 88.2) { setProb("88.2"); setIsDone(true); clearInterval(interval); }
                    else { setProb(current.toFixed(1)); }
                }, 50);
                return () => clearInterval(interval);
            }, []);
            return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#1a1a1a] p-8 relative overflow-hidden">
                    <div className="crt-overlay" />
                    <div className="scanline" />
                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="max-w-xl w-full border border-white/10 bg-[#2b2b2b]/40 p-12 backdrop-blur-xl z-10">
                        <div className="text-[10px] font-semibold mb-8 text-[#ffb100]">Consulting estimation v0.1</div>
                        <h2 className="text-4xl font-display font-bold mb-6 tracking-tight">Utopian probability</h2>
                        <div className="text-6xl font-display font-bold text-[#00ff41] mb-8 tabular-nums">{prob}%</div>
                        {isDone && <button onClick={onComplete} className="w-full py-4 border border-[#00ff41] text-[#00ff41] hover:bg-[#00ff41] hover:text-black transition-all font-bold text-xs uppercase">Proceed</button>}
                    </motion.div>
                </div>
            );
        };

        // Main App Logic
        function App() {
            const [currentStep, setCurrentStep] = useState('estimation');
            const [isGlitching, setIsGlitching] = useState(false);
            const { playGlitch } = useSound();

            useEffect(() => {
                const interval = setInterval(() => { 
                    if (Math.random() > 0.98 && currentStep === 'main') { 
                        setIsGlitching(true); 
                        playGlitch(); 
                        setTimeout(() => setIsGlitching(false), 150); 
                    } 
                }, 3000);
                return () => clearInterval(interval);
            }, [currentStep]);

            if (currentStep === 'estimation') return <EstimationScreen onComplete={() => setCurrentStep('main')} />;

            return (
                <div className={cn("h-screen flex flex-col bg-[#1a1a1a] overflow-hidden", isGlitching ? 'glitch-active' : '')}>
                    <MatrixRain />
                    <div className="crt-overlay" />
                    <main className="flex-1 overflow-y-auto p-12 relative z-10">
                        <div className="max-w-4xl mx-auto py-24">
                            <h1 className="text-6xl font-display font-bold text-white mb-12">
                                <span className="text-[#00ff41] glitch-text" data-text="Katcode">Katcode</span>
                            </h1>
                            <div className="markdown-body" dangerouslySetInnerHTML={{ __html: marked.parse(PROTOCOL_TEXT) }} />
                            <pre className="mt-12 p-6 border border-[#ffb100]/20 text-[#ffb100] bg-black/40">{POEM_TEXT}</pre>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
